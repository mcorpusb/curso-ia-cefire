<script>
window.__releasePages = [
{%- for p in site.pages -%}
  {%- if p.title -%}
  { url: {{ p.url | relative_url | jsonify }},
    title: {{ p.title | jsonify }},
    parent: {{ p.parent | jsonify }},
    releaseAt: {{ p.release_at | jsonify }} },
  {%- endif -%}
{%- endfor -%}
];
</script>
<script defer src="{{ '/assets/js/release-gates.js' | relative_url }}"></script>
