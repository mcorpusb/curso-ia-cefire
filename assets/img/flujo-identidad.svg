<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
<rect width="1600" height="900" fill="white"/>
<g font-family="Arial, Helvetica, sans-serif" font-size="38" fill="#333">
  <rect x="120" y="80" width="260" height="80" rx="20" fill="#E3F2FD" stroke="#1976D2" stroke-width="3"/>
  <text x="250" y="135" text-anchor="middle">👤 Usuario</text>
  <line x1="250" y1="160" x2="250" y2="200" stroke="#1976D2" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="120" y="200" width="260" height="80" rx="20" fill="#E8F5E9" stroke="#388E3C" stroke-width="3"/>
  <text x="250" y="255" text-anchor="middle">Usuario + contraseña</text>
  <line x1="250" y1="280" x2="250" y2="320" stroke="#388E3C" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="120" y="320" width="260" height="80" rx="20" fill="#FFF3E0" stroke="#F57C00" stroke-width="3"/>
  <text x="250" y="375" text-anchor="middle">🔍 Verificación</text>
  <line x1="250" y1="400" x2="250" y2="440" stroke="#F57C00" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="120" y="440" width="260" height="80" rx="20" fill="#F3E5F5" stroke="#8E24AA" stroke-width="3"/>
  <text x="250" y="495" text-anchor="middle">🔐 MFA / doble factor</text>
  <line x1="250" y1="520" x2="250" y2="560" stroke="#8E24AA" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="120" y="560" width="260" height="80" rx="20" fill="#E0F7FA" stroke="#00838F" stroke-width="3"/>
