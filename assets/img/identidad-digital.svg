<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
<rect width="1400" height="900" fill="white"/>
<g font-family="Arial, Helvetica, sans-serif" font-size="38" fill="#333">
  <!-- Nodo central -->
  <circle cx="700" cy="400" r="110" fill="#E3F2FD" stroke="#1976D2" stroke-width="5"/>
  <text x="700" y="410" text-anchor="middle" font-size="40" font-weight="bold">Identidad digital<br/>docente</text>
  <!-- Nodos periféricos -->
  <rect x="250" y="120" width="220" height="80" rx="30" fill="#E8F5E9" stroke="#388E3C" stroke-width="3"/>
  <text x="360" y="170" text-anchor="middle">Usuario</text>
  <rect x="950" y="120" width="220" height="80" rx="30" fill="#FFF3E0" stroke="#F57C00" stroke-width="3"/>
  <text x="1060" y="170" text-anchor="middle">Contraseña</text>
  <rect x="180" y="600" width="320" height="80" rx="30" fill="#F3E5F5" stroke="#8E24AA" stroke-width="3"/>
  <text x="340" y="650" text-anchor="middle">Correo @edu.gva.es</text>
  <rect x="900" y="600" width="320" height="80" rx="30" fill="#E0F7FA" stroke="#00838F" stroke-width="3"/>
  <text x="1060" y="650" text-anchor="middle">Perfil profesional</text>
  <rect x="590" y="780" width="220" height="80" rx="30" fill="#F1F8E9" stroke="#689F38" stroke-width="3"/>
  <text x="700" y="830" text-anchor="middle">Acceso seguro a<br/>plataformas</text>
  <!-- Conexiones -->
  <line x1="700" y1="510" x2="700" y2="780" stroke="#1976D2" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="700" y1="290" x2="360" y2="200" stroke="#388E3C" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="700" y1="290" x2="1060" y2="200" stroke="#F57C00" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="700" y1="510" x2="340" y2="600" stroke="#8E24AA" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="700" y1="510" x2="1060" y2="600" stroke="#00838F" stroke-width="4" marker-end="url(#arrow)"/>
</g>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,10 L10,5 z" fill="#1976D2" />
  </marker>
</defs>
</svg>