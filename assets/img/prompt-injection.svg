<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
<rect width="1400" height="900" fill="white"/>
<g font-family="Arial, Helvetica, sans-serif" font-size="36" fill="#333">
  <text x="700" y="90" text-anchor="middle" font-size="48" font-weight="bold">Riesgo: prompt injection en IA</text>
  <!-- Entrada externa -->
  <rect x="150" y="180" width="400" height="80" rx="25" fill="#E3F2FD" stroke="#1976D2" stroke-width="3"/>
  <text x="350" y="235" text-anchor="middle">Contenido externo</text>
  <line x1="350" y1="260" x2="350" y2="320" stroke="#1976D2" stroke-width="4" marker-end="url(#arrow)"/>
  <!-- Instrucciones ocultas -->
  <rect x="150" y="320" width="400" height="80" rx="25" fill="#FFF3E0" stroke="#F57C00" stroke-width="3"/>
  <text x="350" y="375" text-anchor="middle">Instrucciones ocultas</text>
  <line x1="350" y1="400" x2="350" y2="460" stroke="#F57C00" stroke-width="4" marker-end="url(#arrow)"/>
  <!-- IA interpreta -->
  <rect x="150" y="460" width="400" height="80" rx="25" fill="#E8F5E9" stroke="#388E3C" stroke-width="3"/>
  <text x="350" y="515" text-anchor="middle">La IA interpreta como órdenes</text>
  <line x1="350" y1="540" x2="350" y2="600" stroke="#F57C00" stroke-width="4" marker-end="url(#arrow)"/>
  <!-- Respuesta manipulada -->
  <rect x="150" y="600" width="400" height="80" rx="25" fill="#FFF3E0" stroke="#F57C00" stroke-width="3"/>
  <text x="350" y="655" text-anchor="middle">Respuesta manipulada / fuga</text>
  <!-- Mitigación -->
  <rect x="700" y="320" width="500" height="120" rx="30" fill="#E8F5E9" stroke="#388E3C" stroke-width="3"/>
  <text x="950" y="390" text-anchor="middle">👁️ Revisión humana<br/><tspan font-size="30">(mitigación)</tspan></text>
  <line x1="550" y1="640" x2="950" y2="440" stroke="#388E3C" stroke-width="4" marker-end="url(#arrow)"/>
</g>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,10 L10,5 z" fill="#1976D2" />
  </marker>
</defs>
</svg>