<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
<rect width="1400" height="900" fill="white"/>
<g font-family="Arial, Helvetica, sans-serif" font-size="38" fill="#333">
  <text x="700" y="90" text-anchor="middle" font-size="48" font-weight="bold">Uso seguro de IA: checklist docente</text>
  <!-- Checklist -->
  <g>
    <rect x="250" y="180" width="900" height="90" rx="25" fill="#E3F2FD" stroke="#1976D2" stroke-width="3"/>
    <text x="300" y="240" font-size="38">☑</text>
    <text x="370" y="240" font-size="38" text-anchor="start">No introducir datos sensibles</text>
  </g>
  <g>
    <rect x="250" y="290" width="900" height="90" rx="25" fill="#E8F5E9" stroke="#388E3C" stroke-width="3"/>
    <text x="300" y="350" font-size="38">☑</text>
    <text x="370" y="350" font-size="38" text-anchor="start">Minimizar o anonimizar datos</text>
  </g>
  <g>
    <rect x="250" y="400" width="900" height="90" rx="25" fill="#FFF3E0" stroke="#F57C00" stroke-width="3"/>
    <text x="300" y="460" font-size="38">☑</text>
    <text x="370" y="460" font-size="38" text-anchor="start">Verificar resultados</text>
  </g>
  <g>
    <rect x="250" y="510" width="900" height="90" rx="25" fill="#F3E5F5" stroke="#8E24AA" stroke-width="3"/>
    <text x="300" y="570" font-size="38">☑</text>
    <text x="370" y="570" font-size="38" text-anchor="start">No confiar ciegamente</text>
  </g>
  <g>
    <rect x="250" y="620" width="900" height="90" rx="25" fill="#E0F7FA" stroke="#00838F" stroke-width="3"/>
    <text x="300" y="680" font-size="38">☑</text>
    <text x="370" y="680" font-size="38" text-anchor="start">Usar criterio profesional</text>
  </g>
