<svg width="100%" height="auto" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
<rect width="1400" height="900" fill="#fff"/>
<g font-family="Arial, Helvetica, sans-serif" font-size="38" fill="#222">
  <text x="700" y="90" text-anchor="middle" font-size="48" font-weight="bold">Cifrado del dispositivo</text>
  <!-- Dispositivo principal -->
  <rect x="180" y="180" width="340" height="90" rx="25" fill="#E3F2FD" stroke="#1976D2" stroke-width="3"/>
  <text x="350" y="240" text-anchor="middle">💻 Dispositivo</text>
  <line x1="350" y1="270" x2="350" y2="320" stroke="#1976D2" stroke-width="4" marker-end="url(#arrow)"/>
  <!-- Disco cifrado -->
  <rect x="180" y="320" width="340" height="90" rx="25" fill="#E8F5E9" stroke="#388E3C" stroke-width="3"/>
  <text x="350" y="380" text-anchor="middle">🔒 Disco cifrado</text>
  <line x1="350" y1="410" x2="350" y2="460" stroke="#388E3C" stroke-width="4" marker-end="url(#arrow)"/>
  <!-- Datos protegidos -->
  <rect x="180" y="460" width="340" height="90" rx="25" fill="#F1F8E9" stroke="#689F38" stroke-width="3"/>
  <text x="350" y="520" text-anchor="middle">🛡️ Datos protegidos</text>
  <!-- Acceso físico bloqueado -->
  <rect x="600" y="320" width="340" height="90" rx="25" fill="#FFF3E0" stroke="#F57C00" stroke-width="3"/>
  <text x="770" y="380" text-anchor="middle">🚫 Acceso físico no autorizado</text>
  <!-- Referencias a sistemas -->
  <rect x="1000" y="180" width="200" height="70" rx="15" fill="#F3E5F5" stroke="#8E24AA" stroke-width="2"/>
  <text x="1100" y="225" text-anchor="start" font-size="30">🍎 FileVault</text>
  <rect x="1000" y="270" width="200" height="70" rx="15" fill="#E0F7FA" stroke="#00838F" stroke-width="2"/>
  <text x="1100" y="315" text-anchor="start" font-size="30">🦟 BitLocker</text>
  <rect x="1000" y="360" width="200" height="70" rx="15" fill="#F1F8E9" stroke="#689F38" stroke-width="2"/>
  <text x="1100" y="405" text-anchor="start" font-size="30">🐧 Linux</text>
</g>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,10 L10,5 z" fill="#1976D2" />
  </marker>
</defs>
</svg>