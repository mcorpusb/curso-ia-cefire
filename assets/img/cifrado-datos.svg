<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
<rect width="1400" height="900" fill="white"/>
<g font-family="Arial, Helvetica, sans-serif" font-size="38" fill="#333">
  <text x="700" y="90" text-anchor="middle" font-size="48" font-weight="bold">Cifrado del dispositivo</text>
  <!-- Dispositivo principal -->
  <rect x="200" y="200" width="350" height="90" rx="25" fill="#E3F2FD" stroke="#1976D2" stroke-width="3"/>
  <text x="375" y="260" text-anchor="middle">💻 Dispositivo</text>
  <line x1="375" y1="290" x2="375" y2="340" stroke="#1976D2" stroke-width="4" marker-end="url(#arrow)"/>
  <!-- Disco cifrado -->
  <rect x="200" y="340" width="350" height="90" rx="25" fill="#E8F5E9" stroke="#388E3C" stroke-width="3"/>
  <text x="375" y="400" text-anchor="middle">🔒 Disco cifrado</text>
  <line x1="375" y1="430" x2="375" y2="480" stroke="#388E3C" stroke-width="4" marker-end="url(#arrow)"/>
  <!-- Datos protegidos -->
  <rect x="200" y="480" width="350" height="90" rx="25" fill="#F1F8E9" stroke="#689F38" stroke-width="3"/>
  <text x="375" y="540" text-anchor="middle">🛡️ Datos protegidos</text>
  <!-- Acceso físico bloqueado -->
  <rect x="600" y="340" width="350" height="90" rx="25" fill="#FFF3E0" stroke="#F57C00" stroke-width="3"/>
  <text x="775" y="400" text-anchor="middle">🚫 Acceso físico no autorizado</text>
  <!-- Referencias a sistemas -->
  <rect x="1000" y="200" width="200" height="70" rx="15" fill="#F3E5F5" stroke="#8E24AA" stroke-width="2"/>
  <text x="1100" y="245" text-anchor="start" font-size="30">🍎 FileVault</text>
  <rect x="1000" y="290" width="200" height="70" rx="15" fill="#E0F7FA" stroke="#00838F" stroke-width="2"/>
  <text x="1100" y="335" text-anchor="start" font-size="30">🦟 BitLocker</text>
  <rect x="1000" y="380" width="200" height="70" rx="15" fill="#F1F8E9" stroke="#689F38" stroke-width="2"/>
  <text x="1100" y="425" text-anchor="start" font-size="30">🐧 Linux</text>
</g>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,10 L10,5 z" fill="#1976D2" />
  </marker>
</defs>
</svg>